[build]
builder = "nixpacks"
buildCommand = "curl -sS https://getcomposer.org/installer | php -- --install-dir=/usr/local/bin --filename=composer && composer install --no-dev --optimize-autoloader && npm ci && npm run build && php artisan config:cache && php artisan view:cache"

[deploy]
startCommand = "php artisan serve --host=0.0.0.0 --port=$PORT"

[nixpacks]
phpVersion = "8.4"